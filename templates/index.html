<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Performance Predictor</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc 60%, #ecfeff);
        color: #0f172a;
      }

      .hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .hero-card {
        max-width: 700px;
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
      }

      .hero-card h1 {
        font-size: 2.2rem;
        margin-bottom: 12px;
      }

      .hero-card p {
        color: #64748b;
        line-height: 1.7;
        margin-bottom: 24px;
      }

      .btn {
        display: inline-block;
        padding: 12px 20px;
        border-radius: 999px;
        background: #4f46e5;
        color: white;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="hero">
      <div class="hero-card">
        <h1>Welcome to the Student Performance Predictor</h1>
        <p>
          Explore a polished and user-friendly experience for predicting maths
          scores with meaningful student data inputs.
        </p>
        <a class="btn" href="{{ url_for('predict_datapoint') }}"
          >Go to Prediction Page</a
        >
      </div>
    </div>
  </body>
</html>
